query AnimeSearch($offset: Int, $filter: ContentSearchPPVFilterInput) {
  graphql: legacySearchPPV(
    limit: 120
    offset: $offset
    floor: ANIME
    sort: RELEASE_DATE
    filter: $filter
    includeExplicit: true
  ) {
    result {
      contents {
        id
      }
      pageInfo {
        hasNext
      }
    }
  }
}
